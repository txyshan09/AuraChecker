<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Aura Checker binds an account to a clean visual aura reading."
    />
    <title>Aura Checker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}" />
    <script src="{{ url_for('static', path='app.js') }}" defer></script>
  </head>
  <body>
    <main class="page-shell">
      <section class="stage" aria-label="Aura Checker">
        <nav class="stage-nav">
          <a class="brand" href="/" aria-label="Aura Checker home">
            <span class="brand-mark"></span>
            <span>Aura Checker</span>
          </a>
          <a class="login-link" href="#login">Login</a>
        </nav>

        <div class="stage-body">
          <section class="visual-panel" aria-label="Aura visual">
            <div class="visual-frame">
              <span class="wave wave-one"></span>
              <span class="wave wave-two"></span>
              <span class="wave wave-three"></span>
              <span class="node node-one"></span>
              <span class="node node-two"></span>
              <span class="node node-three"></span>
              <p>visual</p>
            </div>
          </section>

          <section id="checker" class="bind-panel" aria-label="Bind account">
            <p class="microcopy">bind account</p>
            <form id="aura-form">
              <input name="name" type="hidden" value="You" />
              <input name="birth_month" type="hidden" value="6" />
              <input name="mood" type="hidden" value="locked-in" />
              <input name="focus" type="hidden" value="fame" />

              <label for="binding-account">Account</label>
              <input
                id="binding-account"
                name="binding_name"
                maxlength="40"
                placeholder="@username"
                autocomplete="off"
              />
              <button type="submit">bind</button>
            </form>
          </section>

          <section class="result-line" aria-label="Aura result">
            <div class="aura-chip">
              <span id="aura-orb"></span>
              <strong id="aura-name">Neon Sage</strong>
            </div>
            <p id="aura-meaning">sharp intuition, quiet confidence, and future-facing focus</p>
            <p>
              <span id="binding-label">Solo aura</span>
              <span id="binding-score">--</span>
            </p>
          </section>
        </div>
      </section>

      <section class="below-readout" aria-label="Aura score">
        <span>Aura score</span>
        <strong id="aura-score">{{ signal_score }}</strong>
        <div class="score-track"><span id="score-bar"></span></div>
        <p id="focus-reading">Your visibility aura is heating up.</p>
        <p id="binding-copy">Type an account and bind the visual.</p>
      </section>
    </main>
  </body>
</html>
